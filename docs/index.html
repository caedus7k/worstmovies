<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Worst Rated Movies</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f8fafc;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 2.4rem;
        }

        .intro {
            color: #cbd5e1;
            max-width: 42rem;
        }

        .search {
            display: flex;
            gap: 0.75rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .search input {
            flex: 1 1 280px;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f8fafc;
        }

        .search button {
            padding: 0.95rem 1.4rem;
            border: none;
            border-radius: 12px;
            background: #7c3aed;
            color: white;
            cursor: pointer;
        }

        .status {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 12px;
            background: #111827;
            color: #f8fafc;
            border: 1px solid #334155;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .movie-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        .poster {
            width: 100%;
            height: 420px;
            object-fit: cover;
        }

        .content {
            padding: 1rem 1.2rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .description {
            color: #e2e8f0;
            margin: 0;
            line-height: 1.5;
        }

        .links a {
            color: #a78bfa;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <h1>Worst Rated Movies</h1>
            <p class="intro">Static snapshot of Rotten Tomatoes 0% films. Search by title and open preview or Rotten
                Tomatoes links.</p>
        </header>

        <form id="search-form" class="search">
            <input id="search" name="search" type="search" placeholder="Filter by title..." />
            <button type="submit">Filter</button>
        </form>

        <div id="status" class="status" hidden></div>
        <div id="movie-count" class="status" hidden></div>
        <div id="movies" class="movie-grid"></div>

        <div class="footer">Data snapshot from <code>data/worst_movies.json</code>. Refresh the JSON by rerunning the
            scraper script.</div>
    </div>
    <script defer src="app.js"></script>
</body>

</html>
