<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Worst Rated Movies</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="page">
        <header>
            <h1>Worst Rated Movies</h1>
            <p class="intro">Browse films by Rotten Tomatoes score. Includes the complete Nicolas Cage filmography
                regardless of rating. Search by title and open preview or Rotten Tomatoes links.</p>
        </header>

        <form id="search-form" class="search">
            <input id="search" name="search" type="search" placeholder="Filter by title..." />
            <label>
                Max RT score:
                <select id="max-rating" name="max_rating">
                    <option value="100" selected>All</option>
                    <option value="70">≤ 70%</option>
                    <option value="60">≤ 60%</option>
                    <option value="50">≤ 50%</option>
                    <option value="40">≤ 40%</option>
                    <option value="30">≤ 30%</option>
                    <option value="20">≤ 20%</option>
                    <option value="10">≤ 10%</option>
                    <option value="0">0% only</option>
                </select>
            </label>
            <label>
                Genre:
                <select id="genre-filter" name="genre">
                    <option value="">All genres</option>
                </select>
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="cage-filter" />
                <span>Nicolas Cage only</span>
            </label>
            <button type="submit">Filter</button>
        </form>

        <div id="status" class="status" hidden></div>
        <div id="movie-count" class="status" hidden></div>
        <div id="movies" class="movie-grid"></div>

        <div class="footer">Data snapshot from <code>data/worst_movies.json</code>. Refresh the JSON by rerunning the
            scraper script.</div>
    </div>
    <script defer src="app.js"></script>
</body>

</html>
